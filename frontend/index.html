<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能驾驶辅助系统展示台</title>
    <link rel="stylesheet" href="./shared/theme.css" />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="sidebar" aria-label="功能导航">
        <div class="sidebar-header">
          <button id="sidebar-toggle" class="icon-btn" type="button" aria-label="折叠菜单">
            <span class="icon-bars" aria-hidden="true"></span>
          </button>
          <div class="brand-block">
            <p class="brand-tag">ADAS DEMO</p>
            <h1 class="brand-title">智能驾驶辅助系统</h1>
          </div>
        </div>
        <nav id="sidebar-nav" class="sidebar-nav"></nav>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <button id="mobile-menu-btn" class="icon-btn mobile-only" type="button" aria-label="打开菜单">
            <span class="icon-bars" aria-hidden="true"></span>
          </button>
          <div class="topbar-meta">
            <h2 id="page-title" class="page-title"></h2>
            <p id="page-subtitle" class="page-subtitle"></p>
          </div>
        </header>
        <section id="page-root" class="page-root" aria-live="polite"></section>
      </main>
    </div>

    <div id="mobile-overlay" class="mobile-overlay" aria-hidden="true"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
